syntax = "proto3";
package axon.management;

option go_package = "github.com/garysng/axon/gen/proto/management";

import "control.proto";

service ManagementService {
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc RemoveNode(RemoveNodeRequest) returns (RemoveNodeResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse);
  rpc ListTokens(ListTokensRequest) returns (ListTokensResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
}

// ─── Node Management ───

message ListNodesRequest {}

message ListNodesResponse {
  repeated NodeSummary nodes = 1;
}

message NodeSummary {
  string node_id = 1;
  string node_name = 2;
  string status = 3;          // "online" | "offline"
  string arch = 4;
  string ip = 5;
  string agent_version = 6;
  int64 connected_at = 7;     // Unix timestamp
  int64 last_heartbeat = 8;   // Unix timestamp
  axon.control.OSInfo os_info = 9;  // Detailed OS information
}

message GetNodeRequest {
  string node_id = 1;
}

message GetNodeResponse {
  NodeSummary summary = 1;
  int64 uptime_seconds = 2;
  map<string, string> labels = 3;
}

message RemoveNodeRequest {
  string node_id = 1;
}

message RemoveNodeResponse {
  bool success = 1;
  string error = 2;
}

// ─── Auth ───

message LoginRequest {
  string username = 1;
  string password = 2;        // Phase 1: simple username/password
}

message LoginResponse {
  string token = 1;           // JWT token
  int64 expires_at = 2;       // Unix timestamp
  string error = 3;
}

// ─── Token Management ───

message RevokeTokenRequest {
  string token_id = 1;       // JWT ID (jti)
}

message RevokeTokenResponse {
  bool success = 1;
  string error = 2;
}

message ListTokensRequest {
  string kind = 1;            // "cli", "agent", or "" for all
}

message ListTokensResponse {
  repeated TokenInfo tokens = 1;
}

message TokenInfo {
  string id = 1;              // JWT ID (jti)
  string kind = 2;
  string user_id = 3;
  int64 issued_at = 4;
  int64 expires_at = 5;
}

// ─── User Management ───

message CreateUserRequest {
  string username = 1;
  string password = 2;
  repeated string node_ids = 3;
}

message CreateUserResponse {
  bool success = 1;
  string error = 2;
}

message UpdateUserRequest {
  string username = 1;
  string password = 2;        // empty means leave password unchanged
  repeated string node_ids = 3;
}

message UpdateUserResponse {
  bool success = 1;
  string error = 2;
}

message DeleteUserRequest {
  string username = 1;
}

message DeleteUserResponse {
  bool success = 1;
  string error = 2;
}

message ListUsersRequest {}

message ListUsersResponse {
  repeated UserInfo users = 1;
}

message UserInfo {
  string username = 1;
  repeated string node_ids = 2;
  int64 created_at = 3;       // Unix timestamp
  int64 updated_at = 4;       // Unix timestamp
  bool disabled = 5;
}
